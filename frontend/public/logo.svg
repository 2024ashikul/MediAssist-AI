<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2636"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="medGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38ef7d"/>
      <stop offset="100%" stop-color="#11998e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bgGrad)" />

  <rect x="150" y="150" width="500" height="500" rx="140" fill="url(#shieldGrad)" stroke="#1e293b" stroke-width="4" filter="url(#glow)"/>

  <rect x="154" y="154" width="492" height="492" rx="136" fill="none" stroke="url(#medGrad)" stroke-width="2" opacity="0.3"/>

  <g transform="translate(400, 400)">
    
    <g filter="url(#glow)">
      <rect x="-40" y="-140" width="80" height="280" rx="40" fill="url(#medGrad)" />
      <rect x="-140" y="-40" width="280" height="80" rx="40" fill="url(#medGrad)" />
    </g>

    <circle cx="0" cy="0" r="14" fill="#ffffff" />
    <circle cx="0" cy="-80" r="8" fill="#ffffff" opacity="0.8" />
    <circle cx="0" cy="80" r="8" fill="#ffffff" opacity="0.8" />
    <circle cx="-80" cy="0" r="8" fill="#ffffff" opacity="0.8" />
    <circle cx="80" cy="0" r="8" fill="#ffffff" opacity="0.8" />
    
    <line x1="0" y1="-14" x2="0" y2="-80" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-dasharray="4 4"/>
    <line x1="0" y1="14" x2="0" y2="80" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-dasharray="4 4"/>
    <line x1="-14" y1="0" x2="-80" y2="0" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-dasharray="4 4"/>
    <line x1="14" y1="0" x2="80" y2="0" stroke="#ffffff" stroke-width="3" opacity="0.5" stroke-dasharray="4 4"/>

    <path d="M 110,-110 C 110,-70 110,-70 150,-70 C 110,-70 110,-70 110,-30 C 110,-70 110,-70 70,-70 C 110,-70 110,-70 110,-110 Z" 
          fill="url(#aiGrad)" filter="url(#glow)"/>
          
    <path d="M -120,120 C -120,95 -120,95 -95,95 C -120,95 -120,95 -120,70 C -120,95 -120,95 -145,95 C -120,95 -120,95 -120,120 Z" 
          fill="url(#medGrad)" opacity="0.9"/>
          
    <path d="M -170,-90 A 200 200 0 0 1 -90,-170" fill="none" stroke="url(#medGrad)" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <path d="M 90,170 A 200 200 0 0 1 170,90" fill="none" stroke="url(#aiGrad)" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
